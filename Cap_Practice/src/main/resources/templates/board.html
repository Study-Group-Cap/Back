<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시판</title>
    <link rel="stylesheet" href="./css/board.css" />
</head>
<body>
<div class="container">
    <h1>게시판</h1>
    <table>
        <thead>
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post, stat : ${posts}">
            <td th:text="${stat.count}">1</td>
            <td><a th:href="@{'/board/' + ${post.id}}" th:text="${post.title}">제목</a></td>
            <td th:text="${post.writer}">작성자</td>
            <td th:text="${#dates.format(post.createdDate, 'yyyy-MM-dd')}">2025-04-09</td>
        </tr>
        </tbody>
    </table>
    <div class="write-btn">
        <a href="/board/write">글쓰기</a>
    </div>
</div>
</body>
</html>
